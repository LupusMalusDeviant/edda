services:

  # в”Җв”Җ AKG + TDK + Embeddings standalone service (Web-UI + MCP Гјber HTTP/SSE) в”Җв”Җ
  edda:
    image: edda:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edda
    expose:
      - ${EDDA_PORT:-8080}
    volumes:
      - ./data:/app/data
      - ./knowledge:/app/knowledge
      - /var/run/docker.sock:/var/run/docker.sock   # TDK-Sandbox (Docker)
    environment:
      - TZ=${TZ:-Europe/Berlin}
      - ASPNETCORE_HTTP_PORTS=8080
      - GRAPH_PROVIDER=${GRAPH_PROVIDER:-neo4j}
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_AUTH=${NEO4J_AUTH:-none}
      # Embeddings вҖ” openai | google | voyage | ollama | custom | bedrock | null
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-null}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - VOYAGE_API_KEY=${VOYAGE_API_KEY:-}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-}
      - EMBEDDING_BASE_URL=${EMBEDDING_BASE_URL:-}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-}
      - EMBEDDING_DIMENSIONS=${EMBEDDING_DIMENSIONS:-}
      # Wie viele Regeln beim Rebuild parallel embedded werden (beschleunigt v. a. Cloud-Provider; Default 4).
      - EMBEDDING_REBUILD_PARALLELISM=${EMBEDDING_REBUILD_PARALLELISM:-}
      # Bedrock (provider=bedrock): EMBEDDING_API_KEY = AWS Secret Access Key. Leere Keys => AWS-Default-Chain.
      - EMBEDDING_REGION=${EMBEDDING_REGION:-}
      - EMBEDDING_ACCESS_KEY_ID=${EMBEDDING_ACCESS_KEY_ID:-}
      # Chunking вҖ” grosse Dokumente werden vor dem Embedding adaptiv zerlegt; Chunks bleiben im Graph unsichtbar.
      - CHUNKING_ENABLED=${CHUNKING_ENABLED:-true}
      - CHUNKING_MAX_CHARS=${CHUNKING_MAX_CHARS:-1200}
      - CHUNKING_OVERLAP_CHARS=${CHUNKING_OVERLAP_CHARS:-150}
      # LLM-Enrichment (optional; aktiv bei INGESTION_ENRICHER=llm). Keys werden zur Laufzeit aufgeloest.
      - INGESTION_ENRICHER=${INGESTION_ENRICHER:-}
      - INGESTION_LLM_PROVIDER=${INGESTION_LLM_PROVIDER:-}
      - INGESTION_LLM_MODEL=${INGESTION_LLM_MODEL:-}
      - INGESTION_LLM_BASE_URL=${INGESTION_LLM_BASE_URL:-}
      - INGESTION_LLM_API_KEY=${INGESTION_LLM_API_KEY:-}
      # MCP server (intern вҶ’ extern). Opt-in; exposes only the allow-listed tools.
      - MCP_SERVER_ENABLED=${MCP_SERVER_ENABLED:-true}
      - MCP_EXPOSED_TOOLS=${MCP_EXPOSED_TOOLS:-search_memory,list_memory}
      # Schreib-Tools (manage_*) sind ueber MCP standardmaessig gesperrt (read-only); true = erlauben.
      - MCP_ALLOW_WRITE_TOOLS=${MCP_ALLOW_WRITE_TOOLS:-}
      # Optional shared bearer token for /api/akg/* and /mcp (empty = loopback, no auth).
      - EDDA_AUTH_TOKEN=${EDDA_AUTH_TOKEN:-}
      # TDK sandbox: docker (needs the mounted socket) | wasm (local python) | null
      - TDK_SANDBOX_TYPE=${TDK_SANDBOX_TYPE:-docker}
    restart: unless-stopped

  # в”Җв”Җ Optionale Alternative: Memgraph (leichter; nutzt App-seitigen Cosine-Fallback) в”Җв”Җ
  # Aktivieren: GRAPH_PROVIDER=memgraph und NEO4J_URI=bolt://memgraph:7687 setzen,
  # dann `docker compose --profile memgraph up`.
  # memgraph:
  #   image: memgraph/memgraph:latest
  #   container_name: edda-memgraph
  #   profiles: ["memgraph"]
  #   ports:
  #     - "7687:7687"
  #   networks:
  #     - edda-net

